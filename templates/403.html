<!-- templates/403.html - STANDALONE ACCESS DENIED PAGE WITH DARK THEME -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Access Denied - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background gradient effects */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* Main container */
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error Card */
        .error-card {
            background: #1e293b;
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #fbbf24, #2563eb, #fbbf24);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* Icon */
        .icon-wrapper {
            margin-bottom: 32px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .shield-icon {
            width: 120px;
            height: 120px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid rgba(239, 68, 68, 0.2);
        }

        .shield-icon i {
            font-size: 4rem;
            color: #ef4444;
        }

        /* Error Code */
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ef4444, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Title */
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }

        /* Message */
        .error-message {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Divider */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
            margin: 32px auto;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-primary {
            background: #fbbf24;
            color: #0f172a;
        }

        .btn-primary:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #334155;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background: #3b4a5e;
            color: white;
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* Decorative dots */
        .dots-pattern {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            font-size: 2rem;
            color: #fbbf24;
            letter-spacing: 8px;
            pointer-events: none;
            transform: rotate(-15deg);
        }

        .dots-pattern-left {
            position: absolute;
            top: 20px;
            left: 20px;
            opacity: 0.1;
            font-size: 2rem;
            color: #2563eb;
            letter-spacing: 8px;
            pointer-events: none;
            transform: rotate(15deg);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .error-card {
                padding: 32px 20px;
            }

            .error-code {
                font-size: 4.5rem;
            }

            .error-title {
                font-size: 1.6rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        /* Safe areas */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Error Card -->
        <div class="error-card">
            <!-- Icon -->
            <div class="icon-wrapper">
                <div class="shield-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
            </div>

            <!-- Error Code -->
            <div class="error-code">403</div>

            <!-- Title -->
            <h1 class="error-title">Access Denied</h1>

            <!-- Message -->
            <p class="error-message">
                You don't have permission to access this page. Please check your credentials or contact support if you believe this is an error.
            </p>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Buttons -->
            <div class="button-group">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i>
                    Go Back
                </a>
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="bi bi-house-door"></i>
                    Go Home
                </a>
            </div>

            <!-- Decorative Patterns -->
            <div class="dots-pattern">......</div>
            <div class="dots-pattern-left">......</div>
        </div>
    </div>

    <!-- Optional: Add animation to buttons on load -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-2px)';
                });
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
