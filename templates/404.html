<!-- templates/404.html - STANDALONE PAGE NOT FOUND WITH DARK THEME -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Page Not Found - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background gradient effects */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: rotate 20s linear infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: rotate 15s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main container */
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error Card */
        .error-card {
            background: #1e293b;
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f59e0b, #2563eb, #f59e0b);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* Icon */
        .icon-wrapper {
            margin-bottom: 32px;
            animation: wobble 3s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .warning-icon {
            width: 120px;
            height: 120px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid rgba(245, 158, 11, 0.2);
        }

        .warning-icon i {
            font-size: 4rem;
            color: #f59e0b;
        }

        /* Error Code */
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Title */
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }

        /* Message */
        .error-message {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Search Box */
        .search-box {
            background: #0f172a;
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .search-box i {
            color: #f59e0b;
            margin-left: 16px;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
        }

        .search-box input:focus {
            outline: none;
        }

        .search-box input::placeholder {
            color: #475569;
        }

        .search-box button {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .search-box button:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-2px);
        }

        .search-box button:active {
            transform: scale(0.98);
        }

        /* Quick Links */
        .quick-links {
            margin-bottom: 32px;
        }

        .quick-links h3 {
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .quick-link {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .quick-link:hover {
            background: #1e293b;
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.2);
            transform: translateY(-2px);
        }

        .quick-link i {
            color: #f59e0b;
        }

        /* Divider */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            margin: 32px auto;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            min-width: 160px;
        }

        .btn-primary {
            background: #f59e0b;
            color: #0f172a;
        }

        .btn-primary:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #334155;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background: #3b4a5e;
            color: white;
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        /* Decorative elements */
        .floating-shape {
            position: absolute;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        .shape-1 {
            top: 10%;
            left: 10%;
            width: 100px;
            height: 100px;
            border: 2px solid #f59e0b;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: float 8s ease-in-out infinite;
        }

        .shape-2 {
            bottom: 10%;
            right: 10%;
            width: 150px;
            height: 150px;
            border: 2px solid #2563eb;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .error-card {
                padding: 32px 20px;
            }

            .error-code {
                font-size: 4.5rem;
            }

            .error-title {
                font-size: 1.6rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .search-box {
                flex-direction: column;
                background: transparent;
                gap: 10px;
            }

            .search-box button {
                width: 100%;
            }
        }

        /* Safe areas */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Floating shapes -->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="app">
        <!-- Error Card -->
        <div class="error-card">
            <!-- Icon -->
            <div class="icon-wrapper">
                <div class="warning-icon">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
            </div>

            <!-- Error Code -->
            <div class="error-code">404</div>

            <!-- Title -->
            <h1 class="error-title">Page Not Found</h1>

            <!-- Message -->
            <p class="error-message">
                The page you're looking for doesn't exist or has been moved. Try searching or check out some helpful links below.
            </p>

            <!-- Search Box -->
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search for lessons, subjects..." id="searchInput">
                <button onclick="searchSite()">Search</button>
            </div>

            <!-- Quick Links -->
            <div class="quick-links">
                <h3>Popular Destinations</h3>
                <div class="links-grid">
                    <a href="{{ url_for('dashboard') }}" class="quick-link">
                        <i class="bi bi-house-door"></i>
                        Dashboard
                    </a>
                    <a href="{{ url_for('pricing') }}" class="quick-link">
                        <i class="bi bi-tags"></i>
                        Pricing
                    </a>
                    <a href="{{ url_for('user_menu') }}" class="quick-link">
                        <i class="bi bi-person"></i>
                        Profile
                    </a>
                    <a href="{{ url_for('admin_dashboard') }}" class="quick-link">
                        <i class="bi bi-gear"></i>
                        Admin
                    </a>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Buttons -->
            <div class="button-group">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i>
                    Go Back
                </a>
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="bi bi-house-door"></i>
                    Go Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Simple search function
        function searchSite() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (searchTerm) {
                // You can implement search functionality here
                // For now, redirect to dashboard with search query
                window.location.href = "{{ url_for('dashboard') }}?q=" + encodeURIComponent(searchTerm);
            }
        }

        // Allow Enter key to trigger search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSite();
            }
        });

        // Add click animation to buttons
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.btn, .quick-link');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-2px)';
                });
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
