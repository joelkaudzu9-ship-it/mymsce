<!-- templates/payment_status.html - GOLD ON NAVY WITH GLASS MORPHISM -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Payment Status - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        /* Gold on Navy with Morphism */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2b4c;
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        /* ===== PAGE LOADER ===== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2b4c;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .page-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SKELETON LOADING STATES ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.03) 25%,
                rgba(251, 191, 36, 0.1) 50%,
                rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .skeleton-line.w20 { width: 20%; }
        .skeleton-line.w30 { width: 30%; }
        .skeleton-line.w40 { width: 40%; }
        .skeleton-line.w50 { width: 50%; }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w70 { width: 70%; }
        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w90 { width: 90%; }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* ===== STATUS CARD - GLASS MORPHISM ===== */
        .glass-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SPINNER / STATUS ICON ===== */
        .icon-container {
            margin-bottom: 32px;
            position: relative;
            z-index: 2;
        }

        .pending-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            border: 3px solid rgba(251, 191, 36, 0.2);
            border-top: 3px solid #fbbf24;
            border-right: 3px solid #fbbf24;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(16, 185, 129, 0.3);
            animation: scaleIn 0.5s ease;
        }
        .success-icon i {
            font-size: 3rem;
            color: #10b981;
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.3));
        }

        .failed-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(239, 68, 68, 0.3);
            animation: scaleIn 0.5s ease;
        }
        .failed-icon i {
            font-size: 3rem;
            color: #ef4444;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .pulse-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #fbbf24;
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
        }
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== TYPOGRAPHY ===== */
        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
            position: relative;
            z-index: 2;
        }

        .highlight {
            background: linear-gradient(135deg, #fbbf24, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            position: relative;
            z-index: 2;
        }

        /* ===== PAYMENT DETAILS ===== */
        .details-card {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
            border: 1px solid rgba(251, 191, 36, 0.15);
            position: relative;
            z-index: 2;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }
        .detail-row:last-child { border-bottom: none; }

        .detail-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-label i {
            color: #fbbf24;
            font-size: 1rem;
        }

        .detail-value {
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }
        .amount-value {
            color: #fbbf24;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .reference-value {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        /* ===== STATUS BADGE ===== */
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge-pending {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .badge-completed {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .badge-failed {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            border: none;
            position: relative;
            z-index: 2;
        }
        .btn:active { transform: scale(0.98); }

        .btn-outline {
            background: transparent;
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.4);
            margin-bottom: 16px;
        }
        .btn-outline:hover {
            background: rgba(251, 191, 36, 0.05);
            border-color: #fbbf24;
        }
        .btn-outline i { transition: transform 0.3s; }
        .btn-outline:active i { transform: rotate(180deg); }

        .btn-link {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-link:hover {
            color: white;
            background: rgba(251, 191, 36, 0.05);
            border-radius: 30px;
        }
        .btn-link i { color: #fbbf24; }

        /* ===== MANUAL LINK ===== */
        .manual-link {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(251, 191, 36, 0.1);
            display: inline-block;
            margin-top: 12px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            transition: all 0.2s;
        }
        .manual-link:hover {
            background: #fbbf24;
            color: #1a2b4c;
        }

        /* ===== SMALL TEXT ===== */
        .small-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            margin-top: 20px;
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
            z-index: 2;
        }
        .small-text i { color: #fbbf24; }

        /* ===== SKELETON CARD ===== */
        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .toast {
            background: rgba(26, 43, 76, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-left: 4px solid #fbbf24;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 0.9rem;
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            margin-bottom: 8px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }
        .toast i { color: #fbbf24; }
        .toast button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            margin-left: auto;
            font-size: 1.1rem;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .glass-card { padding: 32px 20px; }
            h2 { font-size: 1.5rem; }
            .pending-spinner { width: 60px; height: 60px; }
            .success-icon, .failed-icon { width: 60px; height: 60px; }
            .success-icon i, .failed-icon i { font-size: 2.2rem; }
        }

        /* ===== SAFE AREAS ===== */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="container" id="mainContent">
        <!-- Skeleton Card (shown initially) -->
        <div class="skeleton-card" id="skeletonCard">
            <div style="display: flex; justify-content: center; margin-bottom: 32px;">
                <div class="skeleton" style="width: 80px; height: 80px; border-radius: 50%;"></div>
            </div>
            <div class="skeleton-line w50" style="height: 40px; margin: 0 auto 12px;"></div>
            <div class="skeleton-line w70" style="height: 20px; margin: 0 auto 32px;"></div>
            <div style="background: rgba(0,0,0,0.2); border-radius: 24px; padding: 24px; margin-bottom: 32px;">
                <div class="skeleton-line w90" style="height: 24px; margin-bottom: 16px;"></div>
                <div class="skeleton-line w80" style="height: 24px; margin-bottom: 16px;"></div>
                <div class="skeleton-line w70" style="height: 24px;"></div>
            </div>
            <div class="skeleton-line w100" style="height: 50px; margin-bottom: 16px;"></div>
            <div class="skeleton-line w40" style="height: 20px; margin: 0 auto;"></div>
        </div>

        <!-- Real Content (hidden initially) -->
        <div class="glass-card" id="realCard" style="display: none;">
            <!-- Dynamic Icon Area -->
            <div id="iconArea" class="icon-container">
                <div class="pending-spinner"></div>
                <div class="pulse-dots">
                    <div class="pulse-dot"></div>
                    <div class="pulse-dot"></div>
                    <div class="pulse-dot"></div>
                </div>
            </div>

            <!-- Dynamic Content Area -->
            <div id="contentArea">
                <h2>Processing <span class="highlight">Payment</span></h2>
                <div class="message" id="statusMessage">
                    Please wait while we confirm your payment...
                </div>
            </div>

            <!-- Payment Details (always visible) -->
            <div class="details-card">
                <div class="detail-row">
                    <span class="detail-label">
                        <i class="bi bi-cash-stack"></i>
                        Amount
                    </span>
                    <span class="detail-value amount-value">MWK {{ payment.amount }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">
                        <i class="bi bi-upc-scan"></i>
                        Reference
                    </span>
                    <span class="detail-value reference-value">{{ payment.reference }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">
                        <i class="bi bi-clock-history"></i>
                        Status
                    </span>
                    <span class="status-badge badge-pending" id="statusBadge">Pending</span>
                </div>
            </div>

            <!-- Manual Check Button -->
            <button onclick="checkPaymentStatus()" class="btn btn-outline" id="checkBtn">
                <i class="bi bi-arrow-repeat"></i>
                Check Status Manually
            </button>

            <!-- Dashboard Link -->
            <a href="{{ url_for('dashboard') }}" class="btn-link" id="dashboardLink">
                <i class="bi bi-house"></i>
                Return to Dashboard
            </a>

            <!-- Small Note -->
            <div class="small-text">
                <i class="bi bi-shield-check"></i>
                Your money is safe. We'll redirect you automatically once confirmed.
            </div>
        </div>
    </div>

    <script>
        // ===== TOAST FUNCTION =====
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            if (container.children.length >= 3) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = type === 'success' ? 'check-circle' :
                      type === 'error' ? 'exclamation-circle' :
                      type === 'warning' ? 'exclamation-triangle' : 'info-circle';

            toast.innerHTML = `
                <i class="bi bi-${icon}"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, duration);
        }

        // ===== PAGE LOAD SIMULATION =====
        window.addEventListener('load', function() {
            // Hide loader after 600ms
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 600);

            // Show skeleton for 800ms, then real content
            setTimeout(() => {
                document.getElementById('skeletonCard').style.display = 'none';
                document.getElementById('realCard').style.display = 'block';
            }, 800);

            // Show any flashed messages
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        setTimeout(() => {
                            showToast("{{ message|safe }}", "{{ category if category in ['success', 'error', 'warning'] else 'info' }}");
                        }, {{ (loop.index0 * 200) + 1000 }});
                    {% endfor %}
                {% endif %}
            {% endwith %}

            // Start checking payment status after 2 seconds
            setTimeout(checkPaymentStatus, 2000);
        });

        // ===== PAYMENT STATUS CHECKING =====
        let checkCount = 0;
        const maxChecks = 30; // Check for 90 seconds (30 * 3s)
        let paymentId = {{ payment.id }};

        function updateUIForStatus(status, message) {
            const iconArea = document.getElementById('iconArea');
            const statusBadge = document.getElementById('statusBadge');
            const statusMessage = document.getElementById('statusMessage');
            const contentArea = document.getElementById('contentArea').querySelector('h2');

            if (status === 'completed') {
                // Success UI
                iconArea.innerHTML = `
                    <div class="success-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                `;
                statusBadge.textContent = 'Completed';
                statusBadge.className = 'status-badge badge-completed';
                statusMessage.innerHTML = 'Payment successful! Redirecting...';
                contentArea.innerHTML = 'Payment <span class="highlight">Successful</span>';

                // Redirect to success page
                setTimeout(() => {
                    window.location.href = "{{ url_for('payment_success') }}";
                }, 1500);

            } else if (status === 'failed') {
                // Failed UI
                iconArea.innerHTML = `
                    <div class="failed-icon">
                        <i class="bi bi-x-circle-fill"></i>
                    </div>
                `;
                statusBadge.textContent = 'Failed';
                statusBadge.className = 'status-badge badge-failed';
                statusMessage.innerHTML = 'Payment failed. Please try again.';
                contentArea.innerHTML = 'Payment <span class="highlight">Failed</span>';

                // Redirect to failure page after delay
                setTimeout(() => {
                    window.location.href = "{{ url_for('payment_failed') }}";
                }, 2000);

            } else {
                // Pending - keep as is
                statusBadge.textContent = 'Pending';
                statusBadge.className = 'status-badge badge-pending';
            }
        }

        function checkPaymentStatus() {
            fetch(`/api/payment-status/${paymentId}`)
                .then(response => response.json())
                .then(data => {
                    console.log('Payment status:', data);

                    if (data.status === 'completed') {
                        updateUIForStatus('completed');
                    } else if (data.status === 'failed') {
                        updateUIForStatus('failed');
                    } else {
                        // Still pending
                        updateUIForStatus('pending');

                        checkCount++;
                        if (checkCount < maxChecks) {
                            // Check again in 3 seconds
                            setTimeout(checkPaymentStatus, 3000);
                        } else {
                            // Too many checks - show manual options
                            document.getElementById('iconArea').innerHTML = `
                                <div style="text-align: center;">
                                    <i class="bi bi-hourglass-split" style="font-size: 4rem; color: #fbbf24;"></i>
                                </div>
                            `;
                            document.getElementById('contentArea').innerHTML = `
                                <h2>Still <span class="highlight">Processing?</span></h2>
                                <div class="message">
                                    This is taking longer than expected.<br>
                                    <a href="{{ url_for('verify_payment', reference=payment.reference) }}" class="manual-link">
                                        <i class="bi bi-shield-check"></i>
                                        Click here to verify manually
                                    </a>
                                </div>
                            `;
                            document.getElementById('statusMessage').innerHTML =
                                'This is taking longer than expected. Please check manually.';
                        }
                    }
                })
                .catch(error => {
                    console.error('Error checking payment:', error);
                    showToast('Connection error. Retrying...', 'warning');
                    // Retry on error after 5 seconds
                    setTimeout(checkPaymentStatus, 5000);
                });
        }
    </script>
</body>
</html>
