<!-- templates/reset_password.html - POLISHED GOLD-ON-NAVY RESET PASSWORD PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Set New Password - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        /* Gold on Navy with Morphism */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2b4c; /* Light navy base */
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        /* ===== PAGE LOADER ===== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2b4c;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .page-loader.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-right-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SKELETON LOADING STATES ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.03) 25%,
                rgba(251, 191, 36, 0.1) 50%,
                rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .skeleton-line.w30 { width: 30%; }
        .skeleton-line.w50 { width: 50%; }
        .skeleton-line.w70 { width: 70%; }
        .skeleton-line.w90 { width: 90%; }

        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            border: 1px solid rgba(251, 191, 36, 0.1);
            max-width: 450px;
            width: 100%;
        }

        /* ===== BACKGROUND ===== */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 43, 76, 0.9) 0%, rgba(37, 99, 235, 0.7) 100%);
            z-index: 1;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        /* ===== CLOSE BUTTON ===== */
        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .close-btn:hover {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border-color: #fbbf24;
        }

        .close-btn:active { transform: scale(0.95); }

        @media (max-width: 550px) {
            .close-btn {
                top: 20px;
                right: 20px;
            }
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 32px;
            border: 1px solid rgba(251, 191, 36, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
            width: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid rgba(251, 191, 36, 0.3);
        }

        .icon-circle i {
            font-size: 2.5rem;
            color: #fbbf24;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .header .highlight {
            background: linear-gradient(135deg, #fbbf24, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }

        /* ===== FORM ===== */
        .form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ===== INPUT GROUPS ===== */
        .input-group {
            animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .input-group:nth-child(1) { animation-delay: 0.1s; }
        .input-group:nth-child(2) { animation-delay: 0.15s; }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            margin-left: 8px;
        }

        .input-label i {
            color: #fbbf24;
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #fbbf24;
            font-size: 1.2rem;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 16px 24px 16px 52px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 50px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .form-input:focus {
            outline: none;
            border-color: #fbbf24;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.3);
            font-weight: 400;
        }

        .form-input.error {
            border-color: #EF4444;
        }

        /* ===== PASSWORD TOGGLE ===== */
        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 2;
            transition: all 0.2s;
            padding: 8px;
        }

        .password-toggle:hover {
            color: #fbbf24;
        }

        .password-toggle:active { transform: translateY(-50%) scale(0.95); }

        /* ===== ERROR MESSAGE ===== */
        .error-message {
            color: #F87171;
            font-size: 0.8rem;
            margin-top: 6px;
            margin-left: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== PASSWORD STRENGTH METER ===== */
        .strength-meter {
            margin-top: 10px;
            padding: 0 8px;
        }

        .strength-bars {
            display: flex;
            gap: 4px;
            height: 4px;
            margin-bottom: 6px;
        }

        .strength-bar {
            flex: 1;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-bar.active:nth-child(1) { background: #EF4444; }
        .strength-bar.active:nth-child(2) { background: #EF4444; }
        .strength-bar.active:nth-child(3) { background: #F59E0B; }
        .strength-bar.active:nth-child(4) { background: #F59E0B; }
        .strength-bar.active:nth-child(5) { background: #10B981; }
        .strength-bar.active:nth-child(6) { background: #10B981; }

        .strength-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            transition: color 0.3s;
        }

        .strength-text.weak { color: #EF4444; }
        .strength-text.medium { color: #F59E0B; }
        .strength-text.strong { color: #10B981; }

        /* ===== REQUIREMENTS GRID ===== */
        .requirements-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            padding: 0 8px;
        }

        .requirement {
            font-size: 0.65rem;
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(251, 191, 36, 0.1);
            transition: all 0.3s ease;
        }

        .requirement.met {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        /* ===== PASSWORD MATCH INDICATOR ===== */
        .match-indicator {
            font-size: 0.8rem;
            margin-top: 6px;
            margin-left: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .match-success {
            color: #10B981;
        }

        .match-error {
            color: #EF4444;
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 18px 32px;
            background: #fbbf24;
            border: none;
            border-radius: 50px;
            color: #1a2b4c;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            margin: 10px 0 20px;
            box-shadow: 0 10px 25px -5px rgba(251, 191, 36, 0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease 0.2s both;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -8px rgba(37,99,235,0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .submit-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== BACK TO LOGIN LINK ===== */
        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-link a:hover {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .back-link a:active { transform: scale(0.97); }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .toast {
            background: rgba(26, 43, 76, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-left: 4px solid #fbbf24;
            padding: 14px 20px;
            border-radius: 60px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            width: 100%;
            max-width: 380px;
            animation: toastIn 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
            font-weight: 500;
            pointer-events: auto;
        }

        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }
        .toast i { font-size: 1.2rem; }
        .toast.success i { color: #10b981; }
        .toast.error i { color: #ef4444; }
        .toast.warning i { color: #f59e0b; }
        .toast.info i { color: #fbbf24; }

        .toast button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: auto;
            transition: color 0.2s;
        }
        .toast button:hover { color: white; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .glass-card { padding: 32px 20px; }
            .header h1 { font-size: 1.8rem; }
            .requirements-grid { justify-content: center; }
        }

        /* ===== SAFE AREAS ===== */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
            .toast-container {
                top: max(20px, env(safe-area-inset-top));
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="background"></div>

    <div class="container">
        <!-- Close button -->
        <a href="{{ url_for('login') }}" class="close-btn">
            <i class="bi bi-x-lg"></i>
        </a>

        <!-- Main Content with Skeleton -->
        <div id="mainContent">
            <!-- Skeleton Content (shown initially) -->
            <div id="skeletonContent">
                <div class="skeleton-card">
                    <div style="display: flex; justify-content: center; margin-bottom: 24px;">
                        <div class="skeleton" style="width: 80px; height: 80px; border-radius: 40px;"></div>
                    </div>
                    <div class="skeleton-line w50" style="height: 36px; margin: 0 auto 12px;"></div>
                    <div class="skeleton-line w70" style="height: 20px; margin: 0 auto 32px;"></div>

                    <div style="margin-bottom: 24px;">
                        <div class="skeleton-line w30" style="height: 20px;"></div>
                        <div class="skeleton-line w100" style="height: 56px;"></div>
                    </div>

                    <div style="margin-bottom: 24px;">
                        <div class="skeleton-line w30" style="height: 20px;"></div>
                        <div class="skeleton-line w100" style="height: 56px;"></div>
                    </div>

                    <div class="skeleton-line w100" style="height: 56px; margin: 20px 0;"></div>

                    <div class="skeleton-line w40" style="height: 20px; margin: 0 auto;"></div>
                </div>
            </div>

            <!-- Real Content (hidden initially) -->
            <div id="realContent" style="display: none;">
                <div class="glass-card">
                    <!-- Header -->
                    <div class="header">
                        <div class="icon-circle">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h1>Set New <span class="highlight">Password</span></h1>
                        <p>Enter your new password below.</p>
                    </div>

                    <!-- Form -->
                    <form method="POST" class="form" id="resetForm">
                        {{ form.hidden_tag() if form else '' }}

                        <!-- New Password field -->
                        <div class="input-group">
                            <label class="input-label">
                                <i class="bi bi-lock-fill"></i>
                                New Password
                            </label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock input-icon"></i>
                                <input type="password"
                                       class="form-input"
                                       name="password"
                                       id="password"
                                       placeholder="Enter new password"
                                       required>
                                <button type="button" class="password-toggle" id="togglePassword">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>

                            <!-- Strength meter -->
                            <div class="strength-meter" id="strengthMeter">
                                <div class="strength-bars">
                                    <div class="strength-bar" id="bar1"></div>
                                    <div class="strength-bar" id="bar2"></div>
                                    <div class="strength-bar" id="bar3"></div>
                                    <div class="strength-bar" id="bar4"></div>
                                    <div class="strength-bar" id="bar5"></div>
                                    <div class="strength-bar" id="bar6"></div>
                                </div>
                                <span class="strength-text" id="strengthText">Enter a password</span>
                            </div>

                            <!-- Requirements -->
                            <div class="requirements-grid">
                                <span class="requirement" id="reqLength">6+ characters</span>
                                <span class="requirement" id="reqNumber">1+ number</span>
                                <span class="requirement" id="reqUppercase">1+ uppercase</span>
                                <span class="requirement" id="reqLowercase">1+ lowercase</span>
                                <span class="requirement" id="reqSpecial">1+ special char</span>
                            </div>
                        </div>

                        <!-- Confirm Password field -->
                        <div class="input-group">
                            <label class="input-label">
                                <i class="bi bi-shield-lock-fill"></i>
                                Confirm Password
                            </label>
                            <div class="input-wrapper">
                                <i class="bi bi-lock input-icon"></i>
                                <input type="password"
                                       class="form-input"
                                       name="confirm_password"
                                       id="confirm_password"
                                       placeholder="Confirm new password"
                                       required>
                                <button type="button" class="password-toggle" id="toggleConfirmPassword">
                                    <i class="bi bi-eye" id="toggleConfirmIcon"></i>
                                </button>
                            </div>
                            <div id="passwordMatch" class="match-indicator" style="display: none;"></div>
                        </div>

                        <!-- Submit button -->
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>RESET PASSWORD</span>
                        </button>

                        <!-- Back to login -->
                        <div class="back-link">
                            <a href="{{ url_for('login') }}">
                                <i class="bi bi-arrow-left"></i>
                                Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== TOAST FUNCTION =====
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            if (container.children.length >= 3) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            else if (type === 'error') icon = 'exclamation-circle';
            else if (type === 'warning') icon = 'exclamation-triangle';

            toast.innerHTML = `
                <i class="bi bi-${icon}-fill"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-20px)';
                    setTimeout(() => toast.remove(), 300);
                }
            }, duration);
        }

        // ===== PAGE LOADER & SKELETON =====
        window.addEventListener('load', function() {
            // Hide loader after 800ms
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 800);

            // Show skeleton for 1s, then real content
            setTimeout(() => {
                document.getElementById('skeletonContent').style.display = 'none';
                document.getElementById('realContent').style.display = 'block';
            }, 1000);
        });

        // ===== FLASH MESSAGES =====
        document.addEventListener('DOMContentLoaded', function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        setTimeout(() => {
                            showToast("{{ message|safe }}", "{{ category if category in ['success', 'error', 'warning'] else 'info' }}");
                        }, {{ (loop.index0 * 200) + 1200 }});
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        // ===== PASSWORD TOGGLES =====
        function setupPasswordToggle(toggleId, inputId, iconId) {
            const toggle = document.getElementById(toggleId);
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (toggle && input && icon) {
                toggle.addEventListener('click', function() {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);

                    icon.style.transform = 'scale(0.8)';
                    setTimeout(() => {
                        icon.classList.toggle('bi-eye');
                        icon.classList.toggle('bi-eye-slash');
                        icon.style.transform = 'scale(1)';
                    }, 100);
                });
            }
        }

        // ===== PASSWORD STRENGTH CHECKER =====
        function checkPasswordStrength(password) {
            let score = 0;

            if (password.length >= 6) score++;
            if (password.length >= 8) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            return Math.min(score, 6);
        }

        // ===== UPDATE STRENGTH METER =====
        function updateStrengthMeter(password) {
            const score = checkPasswordStrength(password);
            const bars = document.querySelectorAll('.strength-bar');
            const strengthText = document.getElementById('strengthText');

            bars.forEach(bar => bar.classList.remove('active'));

            for (let i = 0; i < score; i++) {
                if (bars[i]) bars[i].classList.add('active');
            }

            if (score < 2) {
                strengthText.textContent = 'Weak password';
                strengthText.className = 'strength-text weak';
            } else if (score < 4) {
                strengthText.textContent = 'Medium password';
                strengthText.className = 'strength-text medium';
            } else {
                strengthText.textContent = 'Strong password';
                strengthText.className = 'strength-text strong';
            }

            document.getElementById('reqLength').classList.toggle('met', password.length >= 6);
            document.getElementById('reqNumber').classList.toggle('met', /[0-9]/.test(password));
            document.getElementById('reqUppercase').classList.toggle('met', /[A-Z]/.test(password));
            document.getElementById('reqLowercase').classList.toggle('met', /[a-z]/.test(password));
            document.getElementById('reqSpecial').classList.toggle('met', /[^A-Za-z0-9]/.test(password));
        }

        // ===== CHECK PASSWORD MATCH =====
        function checkPasswordMatch() {
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirm_password');
            const matchDiv = document.getElementById('passwordMatch');

            if (!password || !confirm || !matchDiv) return;

            if (confirm.value.length === 0) {
                matchDiv.style.display = 'none';
                return;
            }

            if (password.value === confirm.value) {
                matchDiv.style.display = 'flex';
                matchDiv.innerHTML = '<i class="bi bi-check-circle-fill"></i> Passwords match';
                matchDiv.className = 'match-indicator match-success';
            } else {
                matchDiv.style.display = 'flex';
                matchDiv.innerHTML = '<i class="bi bi-exclamation-circle-fill"></i> Passwords do not match';
                matchDiv.className = 'match-indicator match-error';
            }
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', function() {
            setupPasswordToggle('togglePassword', 'password', 'toggleIcon');
            setupPasswordToggle('toggleConfirmPassword', 'confirm_password', 'toggleConfirmIcon');

            const password = document.getElementById('password');
            if (password) {
                password.addEventListener('input', function() {
                    updateStrengthMeter(this.value);
                    checkPasswordMatch();
                });
            }

            const confirm = document.getElementById('confirm_password');
            if (confirm) {
                confirm.addEventListener('input', checkPasswordMatch);
            }

            const form = document.getElementById('resetForm');
            const submitBtn = document.getElementById('submitBtn');

            if (form && submitBtn) {
                form.addEventListener('submit', function(e) {
                    const password = document.getElementById('password');
                    const confirm = document.getElementById('confirm_password');

                    if (password.value !== confirm.value) {
                        e.preventDefault();
                        showToast('Passwords do not match!', 'error');
                        return;
                    }

                    if (checkPasswordStrength(password.value) < 3) {
                        e.preventDefault();
                        showToast('Please choose a stronger password', 'warning');
                        return;
                    }

                    submitBtn.classList.add('loading');
                    submitBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> RESETTING...';
                });
            }
        });
    </script>
</body>
</html>
