<!-- templates/payment_failed.html - GOLD ON NAVY WITH GLASS MORPHISM -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Payment Failed - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        /* Gold on Navy with Morphism */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2b4c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            line-height: 1.5;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        /* ===== PAGE LOADER ===== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2b4c;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .page-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SKELETON LOADING STATES ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.03) 25%,
                rgba(251, 191, 36, 0.1) 50%,
                rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .skeleton-line.w20 { width: 20%; }
        .skeleton-line.w30 { width: 30%; }
        .skeleton-line.w40 { width: 40%; }
        .skeleton-line.w50 { width: 50%; }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w70 { width: 70%; }
        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w90 { width: 90%; }

        /* ===== MAIN CONTAINER ===== */
        .app {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        /* ===== FAILED CARD - GLASS MORPHISM ===== */
        .glass-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== ERROR ICON ===== */
        .icon-container {
            position: relative;
            z-index: 2;
            margin-bottom: 28px;
        }

        .icon-circle {
            width: 120px;
            height: 120px;
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid rgba(239, 68, 68, 0.3);
            animation: softPulse 2s infinite;
        }

        .icon-circle i {
            font-size: 4rem;
            color: #ef4444;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
        }

        @keyframes softPulse {
            0%, 100% {
                transform: scale(1);
                border-color: rgba(239, 68, 68, 0.3);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2);
            }
            50% {
                transform: scale(1.03);
                border-color: rgba(239, 68, 68, 0.6);
                box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
            }
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ef4444, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 2;
        }

        .lead {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 28px;
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        /* ===== INFO BOX ===== */
        .info-box {
            background: rgba(239, 68, 68, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-left: 4px solid #fbbf24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
            position: relative;
            z-index: 2;
        }

        .info-box i {
            font-size: 1.5rem;
            color: #fbbf24;
            flex-shrink: 0;
        }

        .info-box p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        .info-box strong {
            color: #fbbf24;
            font-weight: 600;
        }

        /* ===== ACTION BUTTONS ===== */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .btn {
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: #fbbf24;
            color: #1a2b4c;
        }
        .btn-primary:hover { background: #f59e0b; }
        .btn-primary i { transition: transform 0.2s; }
        .btn-primary:active i { transform: translateX(4px); }

        .btn-secondary {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .btn-secondary:hover {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
            color: white;
        }

        /* ===== SUPPORT LINK ===== */
        .support-link {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }

        .support-link a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .support-link a:active { opacity: 0.7; }

        /* ===== DECORATIVE DOTS ===== */
        .dots-pattern {
            position: absolute;
            bottom: 20px;
            left: 20px;
            opacity: 0.1;
            font-size: 2rem;
            color: #ef4444;
            letter-spacing: 8px;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .toast {
            background: rgba(26, 43, 76, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-left: 4px solid #fbbf24;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 0.9rem;
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            margin-bottom: 8px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .toast i { color: #fbbf24; }
        .toast button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            margin-left: auto;
            font-size: 1.1rem;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SKELETON CARD ===== */
        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 24px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(239, 68, 68, 0.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            h1 { font-size: 2rem; }
            .lead { font-size: 1rem; }
            .icon-circle { width: 100px; height: 100px; }
            .icon-circle i { font-size: 3rem; }
            .info-box { padding: 16px; }
        }

        /* ===== SAFE AREAS ===== */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Main Content -->
    <div class="app" id="mainContent">
        <!-- Skeleton Card (shown initially) -->
        <div class="skeleton-card" id="skeletonCard">
            <div style="display: flex; justify-content: center; margin-bottom: 28px;">
                <div class="skeleton" style="width: 120px; height: 120px; border-radius: 60px;"></div>
            </div>
            <div class="skeleton-line w50" style="height: 40px; margin: 0 auto 12px;"></div>
            <div class="skeleton-line w70" style="height: 20px; margin: 0 auto 28px;"></div>
            <div style="background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 32px;">
                <div style="display: flex; gap: 12px;">
                    <div class="skeleton" style="width: 40px; height: 40px; border-radius: 20px;"></div>
                    <div class="skeleton-line w80" style="height: 40px;"></div>
                </div>
            </div>
            <div class="skeleton-line w100" style="height: 50px; margin-bottom: 12px;"></div>
            <div class="skeleton-line w100" style="height: 50px;"></div>
            <div class="skeleton-line w40" style="height: 20px; margin: 24px auto 0;"></div>
        </div>

        <!-- Real Content (hidden initially) -->
        <div class="glass-card" id="realCard" style="display: none;">
            <!-- Icon -->
            <div class="icon-container">
                <div class="icon-circle">
                    <i class="bi bi-x-circle-fill"></i>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <h1>Payment Failed</h1>
                <p class="lead">There was an issue processing your payment.</p>

                <!-- Info Box -->
                <div class="info-box">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <p>
                        <strong>Don't worry!</strong> Your account has not been charged.
                        Please try again or contact support if the problem persists.
                    </p>
                </div>

                <!-- Actions -->
                <div class="actions">
                    <a href="{{ url_for('pricing') }}" class="btn btn-primary">
                        <i class="bi bi-arrow-repeat"></i>
                        Try Again
                    </a>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                        <i class="bi bi-house-door"></i>
                        Go to Dashboard
                    </a>
                </div>

                <!-- Support -->
                <div class="support-link">
                    Need help? <a href="#" onclick="showToast('Contact support at support@mymsce.com', 'info'); return false;">Contact Support</a>
                </div>
            </div>

            <!-- Decorative dots -->
            <div class="dots-pattern">......</div>
        </div>
    </div>

    <script>
        // ===== TOAST FUNCTION =====
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            // Limit to 3 toasts
            if (container.children.length >= 3) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = type === 'success' ? 'check-circle' :
                      type === 'error' ? 'exclamation-circle' :
                      type === 'warning' ? 'exclamation-triangle' : 'info-circle';

            toast.innerHTML = `
                <i class="bi bi-${icon}"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, duration);
        }

        // ===== PAGE LOAD SIMULATION =====
        window.addEventListener('load', function() {
            // Hide loader after 600ms
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 600);

            // Show skeleton for 800ms, then real content
            setTimeout(() => {
                document.getElementById('skeletonCard').style.display = 'none';
                document.getElementById('realCard').style.display = 'block';
            }, 800);

            // Show any flashed messages
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        setTimeout(() => {
                            showToast("{{ message|safe }}", "{{ category if category in ['success', 'error', 'warning'] else 'info' }}");
                        }, {{ (loop.index0 * 200) + 1000 }});
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        // ===== AUTO-REDIRECT TIMER (commented out by default) =====
        /*
        let secondsLeft = 10;
        const timerElement = document.createElement('div');
        timerElement.style.marginTop = '16px';
        timerElement.style.fontSize = '0.8rem';
        timerElement.style.color = 'rgba(255, 255, 255, 0.4)';
        timerElement.style.position = 'relative';
        timerElement.style.zIndex = '2';
        timerElement.innerHTML = `Redirecting to pricing in ${secondsLeft} seconds...`;

        document.querySelector('.actions').after(timerElement);

        const timerInterval = setInterval(() => {
            secondsLeft--;
            if (secondsLeft >= 0) {
                timerElement.innerHTML = `Redirecting to pricing in ${secondsLeft} seconds...`;
            }
            if (secondsLeft < 0) {
                clearInterval(timerInterval);
                window.location.href = "{{ url_for('pricing') }}";
            }
        }, 1000);
        */

        // ===== PREVENT DEFAULT ON SUPPORT LINK =====
        document.querySelector('.support-link a')?.addEventListener('click', function(e) {
            e.preventDefault();
            showToast('Contact support at support@mymsce.com', 'info');
        });
    </script>
</body>
</html>
