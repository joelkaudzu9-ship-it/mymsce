<!-- templates/pricing.html - SINGLE CARD VIEW (NO PROTRUSIONS) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Pricing - myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        /* Gold on Navy with Morphism */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2b4c; /* Light navy base */
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        /* ===== PAGE LOADER ===== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2b4c;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .page-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SKELETON LOADING STATES ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.03) 25%,
                rgba(251, 191, 36, 0.1) 50%,
                rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .skeleton-line.w20 { width: 20%; }
        .skeleton-line.w30 { width: 30%; }
        .skeleton-line.w40 { width: 40%; }
        .skeleton-line.w50 { width: 50%; }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w70 { width: 70%; }
        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w90 { width: 90%; }

        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid rgba(251, 191, 36, 0.1);
            max-width: 360px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== MAIN CONTAINER ===== */
        .app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background: #1a2b4c;
            position: relative;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px;
        }

        /* ===== STICKY HEADER ELEMENTS ===== */
        .test-mode-badge {
            position: sticky;
            top: 16px;
            left: 16px;
            float: left;
            background: rgba(251, 191, 36, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 30;
            margin-bottom: 10px;
            animation: slideDown 0.5s ease;
        }

        .close-btn {
            position: sticky;
            top: 16px;
            right: 16px;
            float: right;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fbbf24;
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 30;
            margin-bottom: 10px;
        }
        .close-btn:active { transform: scale(0.95); background: rgba(251, 191, 36, 0.1); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .header {
            clear: both;
            padding: 30px 16px 20px;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .header .highlight {
            background: linear-gradient(135deg, #fbbf24, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        /* ===== TOGGLES - GLASS ===== */
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0 8px;
            padding: 0 16px;
            animation: slideUp 0.5s ease 0.1s both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toggle {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(10px);
            padding: 4px;
            border-radius: 50px;
            display: inline-flex;
            position: relative;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .toggle-option {
            flex: 1;
            padding: 12px 6px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            transition: color 0.2s;
        }
        .toggle-option.active { color: white; }

        .toggle-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            background: #fbbf24;
            border-radius: 50px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
            width: calc(33.33% - 5.33px);
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3);
        }

        /* ===== SINGLE CARD CONTAINER ===== */
        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 16px 20px;
            flex: 1;
            min-height: 500px;
        }

        /* ===== PRICE CARD - GLASS ===== */
        .price-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 24px;
            color: white;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 360px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            animation: cardFadeIn 0.5s ease;
        }
        .price-card.active { border-color: #fbbf24; }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .form-badge {
            display: inline-block;
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .plan-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #fbbf24, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .duration-name {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .price-container {
            margin-bottom: 20px;
            padding: 16px 0;
            border-top: 1px solid rgba(251, 191, 36, 0.15);
            border-bottom: 1px solid rgba(251, 191, 36, 0.15);
        }

        .price {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 4px;
        }
        .currency {
            font-size: 1.6rem;
            font-weight: 600;
            color: #fbbf24;
            margin-top: 6px;
        }
        .price-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .features-list {
            margin-bottom: 24px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }
        .feature-item i {
            color: #fbbf24;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .get-started-btn {
            background: #fbbf24;
            color: #1a2b4c;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            display: block;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .get-started-btn:active {
            transform: scale(0.98);
            box-shadow: 0 10px 20px -8px rgba(251, 191, 36, 0.4);
        }
        .get-started-btn i {
            margin-left: 6px;
            transition: transform 0.2s;
        }
        .get-started-btn:active i { transform: translateX(4px); }

        /* ===== INFO NOTE ===== */
        .info-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            padding: 8px 16px 24px;
            clear: both;
            animation: fadeIn 0.5s ease 0.3s both;
        }
        .info-note i { color: #fbbf24; }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            padding: 0 16px;
        }
        .toast {
            background: rgba(26, 43, 76, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-left: 4px solid #fbbf24;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 0.9rem;
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            margin-bottom: 8px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }
        .toast i { color: #fbbf24; }
        .toast button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            margin-left: auto;
            font-size: 1.1rem;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== MOBILE OPTIMIZATIONS ===== */
        @media (max-width: 380px) {
            .header h1 { font-size: 2rem; }
            .price { font-size: 3rem; }
            .plan-name { font-size: 1.8rem; }
            .price-card { padding: 20px; }
        }

        /* ===== SAFE AREAS ===== */
        @supports (padding: max(0px)) {
            .app {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
            .close-btn {
                top: max(16px, env(safe-area-inset-top));
                right: max(16px, env(safe-area-inset-right));
            }
            .test-mode-badge {
                top: max(16px, env(safe-area-inset-top));
                left: max(16px, env(safe-area-inset-left));
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <div class="app">
        <!-- Test Mode Badge -->
        {% if test_mode %}
        <div class="test-mode-badge">
            <i class="bi bi-flash-fill"></i> TEST MODE
        </div>
        {% endif %}

        <!-- Close Button -->
        <a href="{{ url_for('dashboard') }}" class="close-btn">
            <i class="bi bi-x-lg"></i>
        </a>

        <!-- Header -->
        <div class="header">
            <h1>
                <span class="highlight">Simple</span> Pricing
            </h1>
            <p>Choose your perfect plan</p>
        </div>

        <!-- Form Type Toggle -->
        <div class="toggle-container">
            <div class="toggle" id="formToggle">
                <div class="toggle-slider" id="formSlider"></div>
                <span class="toggle-option active" data-form="form3">Form 3</span>
                <span class="toggle-option" data-form="form4">Form 4</span>
                <span class="toggle-option" data-form="combined">Combined</span>
            </div>
        </div>

        <!-- Duration Toggle -->
        <div class="toggle-container">
            <div class="toggle" id="durationToggle">
                <div class="toggle-slider" id="durationSlider"></div>
                <span class="toggle-option active" data-duration="daily">Daily</span>
                <span class="toggle-option" data-duration="weekly">Weekly</span>
                <span class="toggle-option" data-duration="monthly">Monthly</span>
            </div>
        </div>

        <!-- Single Card Container -->
        <div class="card-container" id="pricingContent">
            <!-- Skeleton Card (shown initially) -->
            <div class="skeleton-card" id="skeletonCard">
                <div class="skeleton-line w40" style="height: 30px;"></div>
                <div class="skeleton-line w70" style="height: 40px; margin: 10px 0;"></div>
                <div class="skeleton-line w50" style="height: 20px;"></div>
                <div class="price-container" style="margin: 20px 0;">
                    <div class="skeleton-line w80" style="height: 60px;"></div>
                </div>
                <div class="features-list">
                    <div class="skeleton-line w90" style="height: 20px;"></div>
                    <div class="skeleton-line w90" style="height: 20px;"></div>
                    <div class="skeleton-line w90" style="height: 20px;"></div>
                    <div class="skeleton-line w90" style="height: 20px;"></div>
                </div>
                <div class="skeleton-line w100" style="height: 50px;"></div>
            </div>

            <!-- Real Price Card (hidden initially, shown by JS) -->
            <div class="price-card" id="priceCard" style="display: none;"></div>
        </div>

        <!-- Info Note -->
        <div class="info-note">
            <i class="bi bi-shield-fill-check"></i>
            Airtel Money & TNM Mpamba accepted
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // ===== PRICING DATA =====
        const pricingData = {
            form3: {
                daily: {
                    amount: '1,030',
                    description: 'Daily access',
                    note: 'per day • no commitment',
                    features: [
                        'All Form 3 lessons',
                        '25+ video lessons',
                        'Practice worksheets',
                        '24-hour access'
                    ]
                },
                weekly: {
                    amount: '6,695',
                    description: 'Weekly access',
                    note: 'per week • 7 days',
                    features: [
                        'All Form 3 lessons',
                        'Unlimited video views',
                        'Practice worksheets',
                        'Progress tracking'
                    ]
                },
                monthly: {
                    amount: '12,500',
                    description: 'Monthly access',
                    note: 'per month • best value',
                    features: [
                        'All Form 3 lessons',
                        'All video lessons',
                        'Downloadable resources',
                        'Full analytics'
                    ]
                }
            },
            form4: {
                daily: {
                    amount: '1,030',
                    description: 'Daily access',
                    note: 'per day • no commitment',
                    features: [
                        'All Form 4 lessons',
                        '25+ video lessons',
                        'Past paper questions',
                        '24-hour access'
                    ]
                },
                weekly: {
                    amount: '6,695',
                    description: 'Weekly access',
                    note: 'per week • 7 days',
                    features: [
                        'All Form 4 lessons',
                        'Unlimited video views',
                        'Past papers',
                        'Progress tracking'
                    ]
                },
                monthly: {
                    amount: '12,500',
                    description: 'Monthly access',
                    note: 'per month • best value',
                    features: [
                        'All Form 4 lessons',
                        'All video lessons',
                        '10 years past papers',
                        'Exam analytics'
                    ]
                }
            },
            combined: {
                daily: {
                    amount: '1,545',
                    description: 'Daily access',
                    note: 'per day • both forms',
                    features: [
                        'Form 3 & 4 lessons',
                        '50+ video lessons',
                        'All worksheets',
                        '24-hour access'
                    ]
                },
                weekly: {
                    amount: '8,500',
                    description: 'Weekly access',
                    note: 'per week • both forms',
                    features: [
                        'Form 3 & 4 lessons',
                        'All video lessons',
                        'All past papers',
                        'Full tracking'
                    ]
                },
                monthly: {
                    amount: '19,500',
                    description: 'Monthly access',
                    note: 'per month • complete',
                    features: [
                        'Form 3 & 4 lessons',
                        'All video lessons (200+)',
                        'All past papers',
                        'Priority support'
                    ]
                }
            }
        };

        const formNames = {
            form3: 'Form 3 Access',
            form4: 'Form 4 Access',
            combined: 'Form 3 & 4 Combined'
        };

        const durationNames = {
            daily: 'Daily',
            weekly: 'Weekly',
            monthly: 'Monthly'
        };

        // ===== TOAST FUNCTION =====
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            if (container.children.length >= 3) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = type === 'success' ? 'check-circle' :
                      type === 'error' ? 'exclamation-circle' :
                      type === 'warning' ? 'exclamation-triangle' : 'info-circle';

            toast.innerHTML = `
                <i class="bi bi-${icon}"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, duration);
        }

        // ===== RENDER PRICE CARD =====
        function renderPriceCard(form, duration) {
            const data = pricingData[form][duration];
            const card = document.getElementById('priceCard');

            card.innerHTML = `
                <div class="form-badge">${formNames[form]}</div>
                <div class="plan-name">${durationNames[duration]}</div>
                <div class="duration-name">${data.description}</div>
                <div class="price-container">
                    <div class="price">
                        <span class="currency">MK</span>
                        <span class="amount">${data.amount}</span>
                    </div>
                    <div class="price-note">${data.note}</div>
                </div>
                <div class="features-list">
                    ${data.features.map(f => `
                        <div class="feature-item">
                            <i class="bi bi-check-circle-fill"></i>
                            <span>${f}</span>
                        </div>
                    `).join('')}
                </div>
                <a href="/subscribe/${form}/${duration}" class="get-started-btn">
                    Get Started <i class="bi bi-arrow-right"></i>
                </a>
            `;

            // Add active class
            card.classList.add('active');

            // Show card
            card.style.display = 'block';
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            // Show flashed messages
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        setTimeout(() => {
                            showToast("{{ message|safe }}", "{{ category if category in ['success', 'error', 'warning'] else 'info' }}");
                        }, {{ (loop.index0 * 200) + 1200 }});
                    {% endfor %}
                {% endif %}
            {% endwith %}

            // Hide loader after 800ms
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 800);

            // Hide skeleton after 1s, show real card
            setTimeout(() => {
                document.getElementById('skeletonCard').style.display = 'none';
                document.getElementById('priceCard').style.display = 'block';
            }, 1000);

            // Initialize
            let currentForm = 'form3';
            let currentDuration = 'daily';

            // Set slider positions
            const formSlider = document.getElementById('formSlider');
            const durationSlider = document.getElementById('durationSlider');

            formSlider.style.transform = 'translateX(0)';
            durationSlider.style.transform = 'translateX(0)';

            // Initial render
            renderPriceCard(currentForm, currentDuration);

            // Form toggle
            document.querySelectorAll('[data-form]').forEach(opt => {
                opt.addEventListener('click', function() {
                    const form = this.dataset.form;

                    // Update active class
                    document.querySelectorAll('[data-form]').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');

                    // Move slider
                    if (form === 'form3') formSlider.style.transform = 'translateX(0)';
                    if (form === 'form4') formSlider.style.transform = 'translateX(100%)';
                    if (form === 'combined') formSlider.style.transform = 'translateX(200%)';

                    currentForm = form;
                    renderPriceCard(currentForm, currentDuration);
                });
            });

            // Duration toggle
            document.querySelectorAll('[data-duration]').forEach(opt => {
                opt.addEventListener('click', function() {
                    const duration = this.dataset.duration;

                    // Update active class
                    document.querySelectorAll('[data-duration]').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');

                    // Move slider
                    if (duration === 'daily') durationSlider.style.transform = 'translateX(0)';
                    if (duration === 'weekly') durationSlider.style.transform = 'translateX(100%)';
                    if (duration === 'monthly') durationSlider.style.transform = 'translateX(200%)';

                    currentDuration = duration;
                    renderPriceCard(currentForm, currentDuration);
                });
            });
        });
    </script>
</body>
</html>
