<!-- templates/welcome.html - CLEAN MINIMALIST WELCOME SCREEN -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Welcome to myMSCE</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        /* Main container - iOS style */
        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            padding: 24px 24px 40px;
            position: relative;
        }

        /* Skip button (optional - for returning users) */
        .skip-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .skip-btn:active {
            background: #f1f5f9;
        }

        /* Main content - flex column to push content down */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 380px;
            margin: 0 auto;
            width: 100%;
        }

        /* Illustration container */
        .illustration {
            width: 100%;
            max-width: 300px;
            margin-bottom: 40px;
            animation: floatUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
        }

        /* SVG Illustration - Three people jumping in celebration */
        .celebration-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px -3px rgba(0,0,0,0.1));
        }

        /* Typography */
        .welcome-header {
            text-align: center;
            margin-bottom: 16px;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            animation-delay: 0.1s;
            opacity: 0;
            transform: translateY(10px);
        }

        .welcome-header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .welcome-header .highlight {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            text-align: center;
            color: #64748b;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 40px;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: translateY(10px);
        }

        /* CTA Button */
        .get-started-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            padding: 18px 32px;
            background: #2563eb;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            box-shadow: 0 10px 25px -5px rgba(37,99,235,0.3);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            animation-delay: 0.3s;
            opacity: 0;
            transform: translateY(10px);
        }

        .get-started-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .get-started-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .get-started-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -8px rgba(37,99,235,0.4);
        }

        .get-started-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Login link for existing users */
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 0.95rem;
            animation: fadeIn 0.6s ease;
            animation-delay: 0.4s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: all 0.2s ease;
        }

        .login-link a:active {
            opacity: 0.8;
        }

        /* Android soft keys simulation */
        .soft-keys {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 24px 8px;
            background: white;
            border-top: 1px solid #f1f5f9;
            margin-top: auto;
        }

        .soft-key {
            color: #94a3b8;
            font-size: 1.2rem;
            padding: 8px 16px;
            border-radius: 40px;
            transition: background 0.2s ease;
        }

        .soft-key:active {
            background: #f1f5f9;
        }

        /* Animations */
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile optimizations */
        @media (max-width: 380px) {
            .welcome-header h1 {
                font-size: 2.5rem;
            }

            .description {
                font-size: 0.9rem;
            }

            .get-started-btn {
                padding: 16px 28px;
                font-size: 1rem;
            }
        }

        /* Handle safe areas for notched phones */
        @supports (padding: max(0px)) {
            .app {
                padding-left: max(24px, env(safe-area-inset-left));
                padding-right: max(24px, env(safe-area-inset-right));
                padding-top: max(24px, env(safe-area-inset-top));
                padding-bottom: max(40px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Skip button for returning users -->
        <a href="{{ url_for('login') }}" class="skip-btn">Skip</a>

        <!-- Main Content -->
        <div class="content">
            <!-- Celebration Illustration (SVG) -->
            <div class="illustration">
                <svg class="celebration-svg" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background elements -->
                    <circle cx="100" cy="80" r="40" fill="#FEF3C7" opacity="0.3"/>
                    <circle cx="220" cy="120" r="50" fill="#DBEAFE" opacity="0.3"/>

                    <!-- Person 1 - jumping (blue) -->
                    <circle cx="100" cy="120" r="25" fill="#2563EB" opacity="0.9"/>
                    <circle cx="100" cy="85" r="18" fill="#2563EB"/>
                    <rect x="92" y="140" width="16" height="40" fill="#1E40AF" rx="8"/>
                    <!-- Arms -->
                    <rect x="70" y="120" width="16" height="30" fill="#1E40AF" rx="8" transform="rotate(-20 70 120)"/>
                    <rect x="114" y="120" width="16" height="30" fill="#1E40AF" rx="8" transform="rotate(20 114 120)"/>

                    <!-- Person 2 - jumping (purple) -->
                    <circle cx="180" cy="100" r="25" fill="#7C3AED" opacity="0.9"/>
                    <circle cx="180" cy="65" r="18" fill="#7C3AED"/>
                    <rect x="172" y="120" width="16" height="40" fill="#5B21B6" rx="8"/>
                    <!-- Arms -->
                    <rect x="150" y="100" width="16" height="30" fill="#5B21B6" rx="8" transform="rotate(-20 150 100)"/>
                    <rect x="194" y="100" width="16" height="30" fill="#5B21B6" rx="8" transform="rotate(20 194 100)"/>

                    <!-- Person 3 - jumping (orange) -->
                    <circle cx="140" cy="80" r="25" fill="#F59E0B" opacity="0.9"/>
                    <circle cx="140" cy="45" r="18" fill="#F59E0B"/>
                    <rect x="132" cy="100" width="16" height="40" fill="#B45309" rx="8" y="100"/>
                    <!-- Arms -->
                    <rect x="110" y="80" width="16" height="30" fill="#B45309" rx="8" transform="rotate(-20 110 80)"/>
                    <rect x="154" y="80" width="16" height="30" fill="#B45309" rx="8" transform="rotate(20 154 80)"/>

                    <!-- Celebration confetti -->
                    <circle cx="50" cy="50" r="4" fill="#F59E0B"/>
                    <circle cx="260" cy="60" r="4" fill="#2563EB"/>
                    <circle cx="280" cy="140" r="4" fill="#7C3AED"/>
                    <circle cx="30" cy="160" r="4" fill="#10B981"/>

                    <!-- Jump lines (motion effect) -->
                    <path d="M70 70 L40 40" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                    <path d="M210 40 L240 20" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                    <path d="M160 140 L130 170" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
                </svg>
            </div>

            <!-- Welcome Header -->
            <div class="welcome-header">
                <h1>
                    WELCOME
                    <span class="highlight">TO</span>
                    myMSCE
                </h1>
            </div>

            <!-- Description / Value Proposition -->
            <div class="description">
                Your ultimate MSCE preparation platform. Access quality video lessons, past papers, and revision materials for Forms 3 and 4. Join thousands of successful students already preparing with us.
            </div>

            <!-- CTA Button -->
            <a href="{{ url_for('register') }}" class="get-started-btn">
                GET STARTED
            </a>

            <!-- Login Link for existing users -->
            <div class="login-link">
                Already have an account?
                <a href="{{ url_for('login') }}">Sign in</a>
            </div>
        </div>

        <!-- Android soft keys simulation -->
        <div class="soft-keys">
            <div class="soft-key">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </div>
            <div class="soft-key">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="2.5"/>
                    <circle cx="12" cy="12" r="8"/>
                </svg>
            </div>
            <div class="soft-key">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
