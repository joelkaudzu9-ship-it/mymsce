<!-- templates/payment_success.html -->
{% extends "base.html" %}

{% block title %}Payment Successful!{% endblock %}

{% block content %}
<div class="min-vh-75 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card border-0 shadow-lg p-5">
                    <div class="mb-4">
                        <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex p-4">
                            <i class="bi bi-check-circle-fill text-success fs-1"></i>
                        </div>
                    </div>
                    <h2 class="fw-bold mb-3">Payment Successful!</h2>
                    <p class="text-muted mb-4">Thank you for subscribing to myMSCE. Your account has been upgraded and you now have full access to all lessons.</p>
                    <div class="d-grid gap-2">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
                            <i class="bi bi-speedometer2 me-2"></i>Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
