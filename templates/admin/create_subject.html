<!-- templates/admin/create_subject.html - POLISHED GOLD-ON-NAVY STANDALONE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>Create Subject - myMSCE Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="{{ url_for('static', filename='js/history-manager.js') }}"></script>

    <style>
        /* Gold on Navy with Morphism */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a2b4c; /* Light navy base */
            color: rgba(255, 255, 255, 0.9);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
        }

        /* ===== PAGE LOADER ===== */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a2b4c;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .page-loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SKELETON LOADING STATES ===== */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255, 255, 255, 0.03) 25%,
                rgba(251, 191, 36, 0.1) 50%,
                rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .skeleton-line.w20 { width: 20%; }
        .skeleton-line.w30 { width: 30%; }
        .skeleton-line.w40 { width: 40%; }
        .skeleton-line.w50 { width: 50%; }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w70 { width: 70%; }
        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w90 { width: 90%; }

        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        .skeleton-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
        }

        /* ===== MAIN CONTAINER ===== */
        .app {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fbbf24;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        .back-btn:hover {
            background: #fbbf24;
            color: #1a2b4c;
            transform: translateX(-4px);
        }

        .back-btn:active { transform: scale(0.95) translateX(-4px); }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header h1 i {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 8px;
            border-radius: 16px;
        }

        /* ===== FORM CARD - GLASS MORPHISM ===== */
        .glass-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(251, 191, 36, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
            margin-bottom: 24px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FORM ELEMENTS ===== */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-label i {
            color: #fbbf24;
            font-size: 1rem;
        }

        .required-star {
            color: #ef4444;
            margin-left: 4px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 16px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .input-group-text {
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            color: #fbbf24;
            font-weight: 500;
            border-right: 1px solid rgba(251, 191, 36, 0.2);
        }

        .input-group .form-control {
            border: none;
            background: transparent;
            border-radius: 0;
        }

        .input-group .form-control:focus {
            box-shadow: none;
        }

        .help-text {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }

        .help-text i {
            color: #fbbf24;
            font-size: 0.8rem;
        }

        /* ===== CHECKBOX ===== */
        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .form-check-input {
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(251, 191, 36, 0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-check-input:checked {
            background: #fbbf24;
            border-color: #fbbf24;
            position: relative;
        }

        .form-check-input:checked::after {
            content: '✓';
            position: absolute;
            color: #1a2b4c;
            font-weight: bold;
            font-size: 14px;
            left: 3px;
            top: -2px;
        }

        .form-check-label {
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.3), transparent);
            margin: 32px 0;
        }

        /* ===== BUTTONS ===== */
        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.3, 1);
            border: none;
            cursor: pointer;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: #fbbf24;
            color: #1a2b4c;
        }

        .btn-primary:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .btn-primary i { transition: transform 0.2s; }
        .btn-primary:hover i { transform: translateX(4px); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(251, 191, 36, 0.1);
            color: white;
            border-color: #fbbf24;
        }

        .btn-secondary i { transition: transform 0.2s; }
        .btn-secondary:hover i { transform: translateX(-4px); }

        /* ===== PREVIEW CARD ===== */
        .preview-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(251, 191, 36, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideInRight 0.6s ease 0.1s both;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .preview-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }

        .preview-header h5 {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-header h5 i {
            color: #fbbf24;
        }

        .preview-body {
            padding: 24px;
        }

        /* Subject Preview Card */
        .subject-preview {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(251, 191, 36, 0.1);
            max-width: 300px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .subject-preview:hover {
            transform: translateY(-4px);
            border-color: rgba(251, 191, 36, 0.3);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
        }

        .preview-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            transition: transform 0.3s;
        }

        .subject-preview:hover .preview-icon {
            transform: scale(1.1);
        }

        .preview-icon i {
            color: #fbbf24;
            filter: drop-shadow(0 5px 15px rgba(251, 191, 36, 0.3));
        }

        .preview-name {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .preview-desc {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .preview-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a2b4c;
        }

        .preview-badge.form4 {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            padding: 0 16px;
        }

        .toast {
            background: rgba(26, 43, 76, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-left: 4px solid #fbbf24;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 0.9rem;
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            margin-bottom: 8px;
            max-width: 380px;
            width: 100%;
            border-radius: 60px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
        }

        .toast i { color: #fbbf24; }
        .toast button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            margin-left: auto;
            font-size: 1.1rem;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== SKELETON CARD ===== */
        .skeleton-card {
            background: rgba(30, 58, 95, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app { padding: 16px; }
            .page-header h1 { font-size: 1.6rem; }
            .glass-card { padding: 24px; }
            .button-group { flex-direction: column; }
            .btn { width: 100%; }
            .preview-body { padding: 16px; }
        }

        /* ===== SAFE AREAS ===== */
        @supports (padding: max(0px)) {
            .app {
                padding-left: max(24px, env(safe-area-inset-left));
                padding-right: max(24px, env(safe-area-inset-right));
                padding-top: max(24px, env(safe-area-inset-top));
                padding-bottom: max(24px, env(safe-area-inset-bottom));
            }
            .toast-container {
                top: max(20px, env(safe-area-inset-top));
            }
        }

        /* Utility */
        .text-danger { color: #ef4444; }
        .d-none { display: none; }
        .mt-4 { margin-top: 24px; }
        .mb-0 { margin-bottom: 0; }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="app">
        <!-- Header -->
        <div class="page-header">
            <a href="{{ url_for('admin_subjects') }}" class="back-btn">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1>
                <i class="bi bi-plus-circle"></i>
                Create New Subject
            </h1>
        </div>

        <!-- Main Content with Skeleton -->
        <div id="mainContent">
            <!-- Real Content -->
            <div id="realContent">
                <!-- Form Card -->
                <div class="glass-card">
                    <form method="POST" action="{{ url_for('admin_create_subject') }}" id="subjectForm">
                        <!-- Subject Name -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-type"></i>
                                Subject Name
                                <span class="required-star">*</span>
                            </label>
                            <input type="text" class="form-control" id="name" name="name" required
                                   placeholder="e.g., Mathematics, Physics, Chemistry">
                            <div class="help-text">
                                <i class="bi bi-info-circle"></i>
                                Enter the full subject name
                            </div>
                        </div>

                        <!-- Form Selection -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-sort-numeric-up"></i>
                                Form
                                <span class="required-star">*</span>
                            </label>
                            <select class="form-select" id="form" name="form" required>
                                <option value="">Select Form</option>
                                <option value="3">Form 3</option>
                                <option value="4">Form 4</option>
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-text-paragraph"></i>
                                Description
                            </label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                      placeholder="Enter a brief description of the subject"></textarea>
                            <div class="help-text">
                                <i class="bi bi-info-circle"></i>
                                This will appear on the subject card
                            </div>
                        </div>

                        <!-- Icon -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-vector-pen"></i>
                                Icon
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">bi bi-</span>
                                <input type="text" class="form-control" id="icon" name="icon" value="book"
                                       placeholder="book, calculator, flask, leaf">
                            </div>
                            <div class="help-text">
                                <i class="bi bi-info-circle"></i>
                                Bootstrap Icon name (e.g., book, calculator, flask, leaf)
                            </div>
                        </div>

                        <!-- Display Order -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-sort-numeric-down"></i>
                                Display Order
                            </label>
                            <input type="number" class="form-control" id="order" name="order" value="0" min="0">
                            <div class="help-text">
                                <i class="bi bi-info-circle"></i>
                                Lower numbers appear first
                            </div>
                        </div>

                        <!-- Active Status -->
                        <div class="form-group">
                            <label class="form-check">
                                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" checked>
                                <span class="form-check-label">Active (visible to students)</span>
                            </label>
                        </div>

                        <!-- Divider -->
                        <div class="divider"></div>

                        <!-- Form Actions -->
                        <div class="button-group">
                            <a href="{{ url_for('admin_subjects') }}" class="btn btn-secondary">
                                <i class="bi bi-x"></i>
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="bi bi-save"></i>
                                Create Subject
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Preview Card -->
                <div class="preview-card">
                    <div class="preview-header">
                        <h5>
                            <i class="bi bi-eye"></i>
                            Live Preview
                        </h5>
                    </div>
                    <div class="preview-body">
                        <div class="subject-preview">
                            <div class="preview-icon" id="previewIcon">
                                <i class="bi bi-book"></i>
                            </div>
                            <h3 class="preview-name" id="previewName">Subject Name</h3>
                            <p class="preview-desc" id="previewDesc">Subject description will appear here</p>
                            <span class="preview-badge" id="previewForm">Form 3</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== TOAST FUNCTION =====
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            if (container.children.length >= 3) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = type === 'success' ? 'check-circle' :
                      type === 'error' ? 'exclamation-circle' :
                      type === 'warning' ? 'exclamation-triangle' : 'info-circle';

            toast.innerHTML = `
                <i class="bi bi-${icon}"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, duration);
        }

        // ===== PAGE LOADER =====
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 600);
        });

        // ===== FORM SUBMISSION LOADING STATE =====
        document.getElementById('subjectForm')?.addEventListener('submit', function(e) {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Creating...';
            submitBtn.style.opacity = '0.8';
            submitBtn.style.pointerEvents = 'none';
            showToast('Creating subject...', 'info');
        });

        // ===== LIVE PREVIEW FUNCTIONALITY =====
        document.addEventListener('DOMContentLoaded', function() {
            const nameInput = document.getElementById('name');
            const descInput = document.getElementById('description');
            const iconInput = document.getElementById('icon');
            const formSelect = document.getElementById('form');

            const previewName = document.getElementById('previewName');
            const previewDesc = document.getElementById('previewDesc');
            const previewIcon = document.getElementById('previewIcon');
            const previewForm = document.getElementById('previewForm');

            // Name preview
            if (nameInput) {
                nameInput.addEventListener('input', function() {
                    previewName.textContent = this.value || 'Subject Name';
                });
            }

            // Description preview
            if (descInput) {
                descInput.addEventListener('input', function() {
                    previewDesc.textContent = this.value || 'Subject description will appear here';
                });
            }

            // Icon preview
            if (iconInput) {
                iconInput.addEventListener('input', function() {
                    const iconValue = this.value || 'book';
                    previewIcon.innerHTML = `<i class="bi bi-${iconValue}"></i>`;
                });
            }

            // Form preview
            if (formSelect) {
                formSelect.addEventListener('change', function() {
                    const form = this.value;
                    previewForm.textContent = form ? `Form ${form}` : 'Form 3';

                    // Update badge style based on form
                    previewForm.className = 'preview-badge';
                    if (form === '4') {
                        previewForm.classList.add('form4');
                    } else {
                        previewForm.classList.remove('form4');
                    }
                });
            }

            // Show any flashed messages
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        setTimeout(() => {
                            showToast("{{ message|safe }}", "{{ category if category in ['success', 'error', 'warning'] else 'info' }}");
                        }, {{ (loop.index0 * 200) + 1000 }});
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });
    </script>
</body>
</html>
