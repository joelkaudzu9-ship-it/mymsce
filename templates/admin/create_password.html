{% extends "base.html" %}

{% block title %}Create Subject{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Create New Subject</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin_create_subject') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Subject Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="form" class="form-label">Form</label>
                        <select class="form-select" id="form" name="form" required>
                            <option value="3">Form 3</option>
                            <option value="4">Form 4</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="icon" class="form-label">Icon (Bootstrap Icon name)</label>
                        <input type="text" class="form-control" id="icon" name="icon" value="book">
                        <small class="text-muted">e.g., book, calculator, flask, leaf</small>
                    </div>

                    <div class="mb-3">
                        <label for="order" class="form-label">Display Order</label>
                        <input type="number" class="form-control" id="order" name="order" value="0">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Create Subject</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
