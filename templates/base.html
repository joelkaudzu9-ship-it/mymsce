<!-- templates/index.html - STANDALONE ONBOARDING LANDING PAGE (NO BASE) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>myMSCE - Malawi's #1 MSCE Tutoring Platform</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .onboarding-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .onboarding-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.8rem;
            color: #2563eb;
        }

        .skip-btn {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .skip-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .skip-btn i {
            font-size: 1.1rem;
        }

        /* ===== HERO IMAGE ===== */
        .hero-image {
            position: relative;
            height: 45vh;
            min-height: 350px;
            overflow: hidden;
        }

        .hero-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            position: relative;
        }

        .hero-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M0 0 L100 100 M100 0 L0 100" stroke="white" stroke-width="1"/></svg>');
            background-size: 40px 40px;
            pointer-events: none;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(15,23,42,0.2) 0%, #0f172a 100%);
        }

        /* ===== CONTENT AREA ===== */
        .onboarding-content {
            flex: 1;
            padding: 30px 24px 20px;
            position: relative;
            z-index: 10;
        }

        .slide {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .slide.active {
            display: block;
        }

        .slide-title {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.1;
            color: white;
            margin-bottom: 16px;
        }

        .gradient-text {
            display: block;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            max-width: 280px;
            margin-bottom: 24px;
        }

        /* ===== SLIDE 2: SUBJECT PILLS ===== */
        .subject-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .pill {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ===== SLIDE 3: PAYMENT ICONS ===== */
        .payment-icons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .payment-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .payment-icon i {
            font-size: 2rem;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .payment-icon span {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
        }

        /* ===== PROGRESS DOTS ===== */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            width: 28px;
            background: white;
        }

        /* ===== CTA SECTION ===== */
        .cta-section {
            padding: 10px 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-outline {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            min-height: 56px;
        }

        .btn-outline:hover {
            border-color: white;
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 16px;
            color: #0f172a;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3);
            min-height: 56px;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.4);
        }

        /* ===== SWIPE HINT ===== */
        .swipe-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: pulse 2s infinite;
            pointer-events: none;
            z-index: 30;
        }

        .swipe-hint i {
            font-size: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== TOAST NOTIFICATIONS (if needed) ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: white;
            color: #0f172a;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ===== MOBILE OPTIMIZATIONS ===== */
        @media (max-width: 380px) {
            .slide-title {
                font-size: 2.5rem;
            }

            .hero-image {
                min-height: 300px;
            }

            .swipe-hint {
                bottom: 130px;
            }
        }

        .swipe-hint.hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <!-- Minimalist Header -->
        <div class="onboarding-header">
            <div class="logo">
                <span class="logo-text">M</span>
            </div>
            <a href="{{ url_for('login') }}" class="skip-btn">
                Skip <i class="bi bi-chevron-right"></i>
            </a>
        </div>

        <!-- Hero Image Area -->
        <div class="hero-image">
            <div class="hero-placeholder">
                <div class="hero-overlay"></div>
                <div class="hero-pattern"></div>
            </div>
        </div>

        <!-- Toast Container (for any flashed messages) -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Content Area (Swipeable Onboarding Slides) -->
        <div class="onboarding-content" id="onboardingContent">
            <!-- Slide 1: Core Value Proposition -->
            <div class="slide active" id="slide1">
                <h1 class="slide-title">
                    MSCE
                    <span class="gradient-text">Success</span>
                </h1>
                <p class="slide-subtitle">
                    Video lessons designed to help you ace your Form 3 & 4 exams
                </p>
            </div>

            <!-- Slide 2: Content Library -->
            <div class="slide" id="slide2">
                <h2 class="slide-title">
                    500+
                    <span class="gradient-text">Lessons</span>
                </h2>
                <p class="slide-subtitle">
                    Mathematics, Physics, Chemistry, Biology & more
                </p>
                <div class="subject-pills">
                    <span class="pill">Math</span>
                    <span class="pill">Physics</span>
                    <span class="pill">Chemistry</span>
                    <span class="pill">Biology</span>
                </div>
            </div>

            <!-- Slide 3: Mobile Money -->
            <div class="slide" id="slide3">
                <h2 class="slide-title">
                    Pay with
                    <span class="gradient-text">Mobile Money</span>
                </h2>
                <p class="slide-subtitle">
                    Airtel Money & TNM Mpamba - no card needed
                </p>
                <div class="payment-icons">
                    <div class="payment-icon">
                        <i class="bi bi-phone"></i>
                        <span>Airtel</span>
                    </div>
                    <div class="payment-icon">
                        <i class="bi bi-phone"></i>
                        <span>TNM</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Indicators -->
        <div class="progress-dots">
            <span class="dot active" data-slide="0"></span>
            <span class="dot" data-slide="1"></span>
            <span class="dot" data-slide="2"></span>
        </div>

        <!-- Bottom CTA Buttons -->
        <div class="cta-section">
            <a href="{{ url_for('login') }}" class="btn-outline">Log In</a>
            <a href="{{ url_for('register') }}" class="btn-primary">Sign Up</a>
        </div>

        <!-- Swipe Hint -->
        <div class="swipe-hint" id="swipeHint">
            <i class="bi bi-chevron-left"></i>
            <span>Swipe to explore</span>
            <i class="bi bi-chevron-right"></i>
        </div>
    </div>

    <script>
        // Toast notification function (preserved)
        function showToast(message, type = 'info', duration = 5000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = 'toast';

            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle-fill';
            if (type === 'error') icon = 'exclamation-circle-fill';

            toast.innerHTML = `
                <i class="bi bi-${icon}" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#2563eb'};"></i>
                <div style="flex: 1;">${message}</div>
                <button onclick="this.parentElement.remove()" style="background: none; border: none; cursor: pointer;">
                    <i class="bi bi-x"></i>
                </button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        // Show flashed messages
        document.addEventListener('DOMContentLoaded', function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        showToast("{{ message|safe }}", "{{ category if category in ['success', 'error'] else 'info' }}");
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });

        // Swipe functionality
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const content = document.getElementById('onboardingContent');
        const swipeHint = document.getElementById('swipeHint');

        if (!slides.length) return;

        // Touch swipe handling
        let touchStartX = 0;
        let touchEndX = 0;

        content.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        content.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const threshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > threshold) {
                if (swipeHint) swipeHint.classList.add('hide');

                if (diff > 0 && currentSlide < slides.length - 1) {
                    goToSlide(currentSlide + 1);
                } else if (diff < 0 && currentSlide > 0) {
                    goToSlide(currentSlide - 1);
                }
            }
        }

        // Dot click handling
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                if (swipeHint) swipeHint.classList.add('hide');
                goToSlide(index);
            });
        });

        function goToSlide(index) {
            if (index === currentSlide) return;

            slides[currentSlide].classList.remove('active');
            slides[index].classList.add('active');

            dots[currentSlide].classList.remove('active');
            dots[index].classList.add('active');

            currentSlide = index;
        }

        // Auto-hide swipe hint
        setTimeout(() => {
            if (swipeHint) {
                swipeHint.style.opacity = '0';
                setTimeout(() => {
                    swipeHint.style.display = 'none';
                }, 500);
            }
        }, 5000);
    </script>
</body>
</html>
